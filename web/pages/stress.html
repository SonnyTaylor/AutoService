<div class="page-container">
    <h1>System Stress Test</h1>
    <div class="card">
        <div class="test-options">

            </label>
            <label>
                <input type="checkbox" id="memory-test" checked>

            </label>
            <label>
                <input type="checkbox" id="disk-test">
                Disk Test
            </label>
        </div>
        <div class="form-group">
            <label for="test-duration">Test Duration (minutes):</label>

        </div>
    </div>
    <div class="card" id="test-results">
        <!-- Results will be populated here -->
    </div>
</div>
